name: Build

concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Setup builds directory
        run: |
          rm -rf builds
          mkdir builds
          cd builds
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch --depth=1 origin builds:builds 2>/dev/null || true
          git checkout builds 2>/dev/null || git checkout --orphan builds

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          mkdir -p $GITHUB_WORKSPACE/builds
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds/ 2>/dev/null || true
          cp build/plugins.json $GITHUB_WORKSPACE/builds/ 2>/dev/null || true

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build $GITHUB_SHA"
            git push -u origin builds
          fi
